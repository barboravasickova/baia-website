<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BAIA</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="landing">
      <div class="landing-inner">
        <img
          class="logo"
          src="images/baia-logo.gif"
          alt="BAIA"
          width="300"
          loading="eager"
          decoding="async"
        />
        <p class="tagline">
          Tady se právě teď bojuje s kódem, tužkou, nápady... <br>
          <span class="tagline-faded">a prokrastinací</span>.
        </p>
        <nav class="social" aria-label="Sociální sítě">
          <a
            class="social-link"
            href="https://www.facebook.com/baia.cz/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Facebook — BAIA"
          >
            <img
              class="social-icon"
              src="images/facebook_icon.png"
              alt=""
              width="22"
              height="22"
              decoding="async"
            />
          </a>
          <a
            class="social-link"
            href="https://www.instagram.com/baia.cz"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram — BAIA"
          >
            <img
              class="social-icon"
              src="images/instagram_icon.png"
              alt=""
              width="22"
              height="22"
              decoding="async"
            />
          </a>
        </nav>
      </div>
    </main>
    <script src="js/main.js"></script>
  </body>
</html>
